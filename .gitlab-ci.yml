stages:
  - lint
  - format
  - type_check
  - test
  - security

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

default:
  image: python:3.11-slim
  tags:
    - docker
    - linux
    - x64
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install \
        ruff \
        pylint \
        flake8 \
        mypy \
        bandit \
        vulture \
        pytest \
        pytest-cov \
        pip-audit \
        semgrep

# Lint Stage
lint:
  stage: lint
  script:
    - ruff check app/ tests/
    - pylint app/ --fail-under=7.0
    - flake8 app/ --max-line-length=100 --count
    - vulture app/ --min-confidence 80
  allow_failure: false

# Format Stage
format:
  stage: format
  script:
    - ruff format --check app/
  allow_failure: false

# Type Check Stage
type_check:
  stage: type_check
  script:
    - mypy app/
  allow_failure: false

# Test Stage
test:
  stage: test
  script:
    - python -m app.model
    - pytest tests/ --cov=app --cov-report=term --cov-report=xml --cov-fail-under=30
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  allow_failure: false

# Security Stage
security:
  stage: security
  script:
    - bandit -r app/ -x tests
    - semgrep --config=auto app/ --metrics=off
  allow_failure: false

secret_scanning:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --report-path gitleaks-report.json --report-format json
  allow_failure: false

dependency_audit:
  stage: security
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt --desc --strict
  allow_failure: false